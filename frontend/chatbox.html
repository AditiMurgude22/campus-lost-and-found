<!DOCTYPE html>
<html>
<head>
<title>Chat</title>

<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
    height: 100%;
    font-family: Arial, sans-serif;
}

body {
    display: flex;
    flex-direction: column;
    height: 100vh;
    background: #ece5dd;
}

/* HEADER */
.header {
    background: #075e54;
    color: white;
    padding: 12px;
    display: flex;
    align-items: center;
    flex-shrink: 0;
}

.back {
    font-size: 20px;
    margin-right: 10px;
    cursor: pointer;
}

.name {
    font-weight: bold;
}

/* CHAT AREA */
.chat-box {
    flex: 1;
    overflow-y: auto;
    padding: 10px;
    display: flex;
    flex-direction: column;
    min-height: 0;
}

/* MESSAGE */
.msg {
    max-width: 70%;
    padding: 10px;
    margin: 6px 0;
    border-radius: 10px;
    font-size: 14px;
    white-space: normal;
    word-wrap: break-word;
    overflow-wrap: break-word;
}

/* LEFT (RECEIVED) */
.left {
    background: white;
    align-self: flex-start;
}

/* RIGHT (SENT) */
.right {
    background: #dcf8c6;
    align-self: flex-end;
}

/* INPUT */
.input-box {
    display: flex;
    background: #f0f0f0;
    padding: 10px;
    flex-shrink: 0;
    border-top: 1px solid #ddd;
}

.input-box input {
    flex: 1;
    padding: 10px;
    border-radius: 20px;
    border: none;
    outline: none;
}

.input-box button {
    background: #075e54;
    color: white;
    border: none;
    padding: 10px 15px;
    margin-left: 10px;
    border-radius: 50%;
    cursor: pointer;
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
    <div class="back" onclick="goBack()">⬅</div>
    <div class="name">Chat</div>
</div>

<!-- CHAT -->
<div id="chatBox" class="chat-box"></div>

<!-- INPUT -->
<div class="input-box">
    <input type="text" id="msgInput" placeholder="Type a message...">
    <button onclick="sendMsg()">➤</button>
</div>

<script>
// 📌 GET ITEM ID FROM URL
const urlParams = new URLSearchParams(window.location.search);
const itemId = urlParams.get("itemId");

// 📌 GET LOGGED USER
const user = JSON.parse(localStorage.getItem("user"));
const currentUser = user?.name || "Guest";

// 🚀 LOAD MESSAGES
async function loadMessages() {
    try {
        const res = await fetch(`http://localhost:5000/api/chat/${itemId}`);
        let data = await res.json();

        // 🔥 REMOVE EMPTY / BAD MESSAGES
        data = data.filter(msg =>
            msg.message &&
            msg.message.trim() !== ""
        );

        const box = document.getElementById("chatBox");
        box.innerHTML = "";

        data.forEach(msg => {
            const side = msg.senderName === currentUser ? "right" : "left";

            box.innerHTML += `
            <div class="msg ${side}">
                ${escapeHtml(msg.message)}
            </div>
            `;
        });

        // 🔥 AUTO SCROLL DOWN
        box.scrollTop = box.scrollHeight;

    } catch (err) {
        console.log("Error loading messages:", err);
    }
}

// 🚀 SEND MESSAGE
async function sendMsg() {
    const input = document.getElementById("msgInput");
    const message = input.value.trim();

    if (!message) return;

    try {
        await fetch("http://localhost:5000/api/chat/send", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                itemId: itemId,
                senderName: currentUser,
                message: message
            })
        });

        input.value = "";
        loadMessages();

    } catch (err) {
        console.log("Error sending message:", err);
    }
}

function escapeHtml(text) {
    const div = document.createElement("div");
    div.textContent = text;
    return div.innerHTML;
}

// 🔙 BACK
function goBack() {
    if (window.history.length > 1) {
        window.history.back();
    } else {
        window.location.href = "index.html";
    }
}

// 🔄 AUTO REFRESH EVERY 2s
setInterval(loadMessages, 2000);

// 🚀 INIT
loadMessages();
</script>

</body>
</html>
