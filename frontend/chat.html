<!DOCTYPE html>
<html>
<head>
<title>Messages</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #f5f7f7;
}

/* HEADER */
.header {
    background: linear-gradient(135deg, #4c8d8d, #2e6f6f);
    color: white;
    padding: 20px;
}

.search {
    width: 90%;
    margin: 10px auto;
    display: block;
    padding: 12px;
    border-radius: 25px;
    border: none;
}

/* CHAT CARD */
.chat {
    background: white;
    margin: 10px;
    padding: 12px;
    border-radius: 15px;
    display: flex;
    gap: 12px;
    align-items: center;
    cursor: pointer;
    box-shadow: 0 2px 5px rgba(0,0,0,0.1);
}

.avatar {
    width: 55px;
    height: 55px;
    background: #4c8d8d;
    color: white;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 50%;
    font-weight: bold;
    font-size: 18px;
}

.name {
    font-weight: bold;
    font-size: 16px;
}

.item {
    font-size: 13px;
    color: #4c8d8d;
}

.msg {
    color: gray;
    font-size: 14px;
}

/* EMPTY */
.empty {
    text-align: center;
    margin-top: 40px;
    color: #777;
}

/* NAV */
.nav {
    position: fixed;
    bottom: 0;
    width: 100%;
    background: white;
    display: flex;
    justify-content: space-around;
    padding: 10px;
    border-top: 1px solid #ccc;
}

.nav div {
    cursor: pointer;
}

/* BACK BUTTON */
.back-btn {
    background: rgba(255,255,255,0.15);
    border: none;
    color: white;
    width: 36px;
    height: 36px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    font-size: 18px;
    transition: background 0.2s, transform 0.15s;
    padding: 0;
}

.back-btn:hover {
    background: rgba(255,255,255,0.3);
    transform: scale(1.05);
}
</style>
</head>

<body>

<div class="header">
    <div style="display:flex;align-items:center;gap:10px;">
        <button class="back-btn" onclick="goBack()">←</button>
        <div>
            <h2 style="margin:0;">Messages</h2>
            <p style="margin:4px 0 0 0;font-size:14px;opacity:0.9;">Chat with other users</p>
        </div>
    </div>
</div>

<input class="search" placeholder="Search conversations..." onkeyup="searchChats()">

<div id="chatList"></div>

<!-- NAV -->
<div class="nav">
    <div onclick="goHome()">🏠 Home</div>
    <div>💬 Messages</div>
    <div onclick="window.location.href='profile.html'">👤 Profile</div>
</div>

<script>
let allChats = [];

// 🚀 LOAD CHATS
async function loadChats() {
    try {
        const res = await fetch("http://localhost:5000/api/chat/all");
        let data = await res.json();

        // 🔥 REMOVE BAD CHATS
        data = data.filter(chat =>
            chat.message &&
            chat.message.trim() !== "" &&
            chat.senderName &&
            chat.senderName !== "User"
        );

        // 🔥 REMOVE DUPLICATES (ONE CHAT PER ITEM)
        const unique = {};

        data.reverse().forEach(chat => {
            if (!unique[chat.itemId]) {
                unique[chat.itemId] = chat;
            }
        });

        allChats = Object.values(unique);

        displayChats(allChats);

    } catch (err) {
        console.log(err);
        showEmpty();
    }
}

// 🎨 DISPLAY
function displayChats(chats) {
    const box = document.getElementById("chatList");
    box.innerHTML = "";

    if (chats.length === 0) {
        showEmpty();
        return;
    }

    chats.forEach(chat => {

        const name = chat.senderName;
        const initials = name.substring(0,2).toUpperCase();

        box.innerHTML += `
        <div class="chat" onclick="openChat('${chat.itemId}')">

            <div class="avatar">${initials}</div>

            <div>
                <div class="name">${name}</div>
                <div class="item">Re: ${chat.itemTitle || "Item"}</div>
                <div class="msg">${chat.message}</div>
            </div>

        </div>
        `;
    });
}

// 🔍 SEARCH
function searchChats() {
    const q = document.querySelector(".search").value.toLowerCase();

    const filtered = allChats.filter(c =>
        c.senderName.toLowerCase().includes(q) ||
        c.message.toLowerCase().includes(q)
    );

    displayChats(filtered);
}

// EMPTY STATE
function showEmpty() {
    document.getElementById("chatList").innerHTML = `
        <div class="empty">
            <p>No conversations yet 💬</p>
        </div>
    `;
}

// OPEN CHAT
function openChat(id) {
    window.location.href = "chatbox.html?itemId=" + id;
}

// NAV
function goHome() {
    window.location.href = "index.html";
}

function goBack() {
    if (window.history.length > 1) {
        window.history.back();
    } else {
        window.location.href = "index.html";
    }
}

// INIT
loadChats();
</script>

</body>
</html>
