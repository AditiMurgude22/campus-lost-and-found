<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profile</title>

<style>
* { box-sizing: border-box; }

body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #eef3f3;
    min-height: 100vh;
    padding-bottom: 60px;
}

/* ===== HEADER ===== */
.header {
    background: linear-gradient(135deg, #4c8d8d, #2e6f6f);
    color: white;
    padding: 20px;
}

.top-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.logout-btn {
    background: white;
    color: #2e6f6f;
    border: none;
    padding: 6px 14px;
    border-radius: 8px;
    cursor: pointer;
    font-weight: bold;
    font-size: 13px;
}

/* ===== PROFILE CARD ===== */
.profile-container {
    padding: 20px;
    max-width: 400px;
    margin: 0 auto;
}

.profile-card {
    background: white;
    border-radius: 20px;
    padding: 30px;
    text-align: center;
    box-shadow: 0 4px 15px rgba(0,0,0,0.08);
}

.profile-avatar {
    width: 90px;
    height: 90px;
    border-radius: 50%;
    background: linear-gradient(135deg, #4c8d8d, #2e6f6f);
    color: white;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 36px;
    font-weight: bold;
    margin: 0 auto 20px;
}

.profile-name {
    font-size: 22px;
    font-weight: bold;
    color: #222;
    margin-bottom: 6px;
}

.profile-email {
    font-size: 14px;
    color: #888;
    margin-bottom: 20px;
}

.profile-detail {
    display: flex;
    justify-content: space-between;
    padding: 12px 0;
    border-bottom: 1px solid #eee;
    font-size: 14px;
}

.profile-detail:last-child {
    border-bottom: none;
}

.detail-label {
    color: #888;
}

.detail-value {
    color: #222;
    font-weight: bold;
    word-break: break-all;
    text-align: right;
    max-width: 60%;
}

/* ===== BOTTOM NAV ===== */
.nav {
    position: fixed;
    bottom: 0;
    width: 100%;
    display: flex;
    justify-content: space-around;
    background: white;
    padding: 10px 0;
    border-top: 1px solid #ddd;
    z-index: 100;
}

.nav div {
    cursor: pointer;
    font-size: 14px;
    color: #666;
    text-align: center;
    flex: 1;
}

.nav div.active {
    color: #2e6f6f;
    font-weight: bold;
}

/* BACK BUTTON */
.back-btn {
    background: rgba(255,255,255,0.15);
    border: none;
    color: white;
    width: 36px;
    height: 36px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    font-size: 18px;
    transition: background 0.2s, transform 0.15s;
    padding: 0;
}

.back-btn:hover {
    background: rgba(255,255,255,0.3);
    transform: scale(1.05);
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
    <div class="top-bar">
        <div style="display:flex;align-items:center;gap:10px;">
            <button class="back-btn" onclick="goBack()">←</button>
            <h2 style="margin:0;">👤 Profile</h2>
        </div>
        <button class="logout-btn" onclick="logout()">Logout</button>
    </div>
</div>

<!-- PROFILE -->
<div class="profile-container">
    <div class="profile-card">
        <div class="profile-avatar" id="profileAvatar">👤</div>
        <div class="profile-name" id="profileName">Loading...</div>
        <div class="profile-email" id="profileEmail">Loading...</div>

        <div class="profile-detail">
            <span class="detail-label">User ID</span>
            <span class="detail-value" id="profileId">-</span>
        </div>
        <div class="profile-detail">
            <span class="detail-label">Name</span>
            <span class="detail-value" id="profileNameDetail">-</span>
        </div>
        <div class="profile-detail">
            <span class="detail-label">Email</span>
            <span class="detail-value" id="profileEmailDetail">-</span>
        </div>
        <div class="profile-detail">
            <span class="detail-label">Status</span>
            <span class="detail-value" style="color:green;">● Active</span>
        </div>
    </div>
</div>

<!-- NAV -->
<div class="nav">
    <div onclick="window.location.href='index.html'">🏠 Home</div>
    <div onclick="window.location.href='chat-tab.html'">💬 Chat</div>
    <div class="active" onclick="location.reload()">👤 Profile</div>
</div>

<script>
const user = JSON.parse(localStorage.getItem("user"));

if (!user || !user.id) {
    alert("Please login first 🔒");
    window.location.href = "auth.html";
}

function loadProfile() {
    const initials = user.name ? user.name.substring(0, 2).toUpperCase() : "??";
    document.getElementById("profileAvatar").textContent = initials;
    document.getElementById("profileName").textContent = user.name || "Unknown";
    document.getElementById("profileEmail").textContent = user.email || "No email";
    document.getElementById("profileId").textContent = user.userId || user.id || "-";
    document.getElementById("profileNameDetail").textContent = user.name || "-";
    document.getElementById("profileEmailDetail").textContent = user.email || "-";
}

function logout() {
    localStorage.removeItem("user");
    window.location.href = "auth.html";
}

function goBack() {
    if (window.history.length > 1) {
        window.history.back();
    } else {
        window.location.href = "index.html";
    }
}

loadProfile();
</script>

</body>
</html>
